name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_URL }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ANTHROPIC_KEY
          script: |
            set -e
            # Support both old (kalshi-arb) and new (slonk-arb) directory layouts
            if [ -d /opt/slonk-arb ]; then
                APP_DIR=/opt/slonk-arb
                DATA_DIR=/var/lib/slonk-arb
                SVC=slonk-arb
                OWNER=slonk
            else
                APP_DIR=/opt/kalshi-arb
                DATA_DIR=/var/lib/kalshi-arb
                SVC=kalshi-arb
                OWNER=kalshi
            fi
            cd "$APP_DIR"
            git reset --hard origin/main
            git pull origin main
            uv sync
            sed "s|slonk-arb|${SVC}|g; s|slonk|${OWNER}|g" "$APP_DIR/deploy/slonk-arb.cron" | sudo tee /etc/cron.d/"$SVC" > /dev/null
            sudo systemctl restart "$SVC"
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
